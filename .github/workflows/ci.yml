name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write

jobs:
  test-macos:
    name: Swift ${{ matrix.swift }} on macOS ${{ matrix.macos }} with Xcode ${{ matrix.xcode }}
    runs-on: macos-${{ matrix.macos }}
    env:
      DEVELOPER_DIR: "/Applications/Xcode_${{ matrix.xcode }}.app/Contents/Developer"
    strategy:
      fail-fast: false
      matrix:
        include:
          - macos: "15"
            swift: "6.1"
            xcode: "16.3"
          - macos: "26"
            swift: "6.2"
            xcode: "26.0"
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache Swift Package Manager dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/org.swift.swiftpm
            .build
          key: ${{ runner.os }}-swift-${{ matrix.swift }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-${{ matrix.swift }}-spm-

      - name: Lint
        run: swift format lint --strict --recursive .

      - name: Build
        run: swift build --build-tests --traits MLX,Llama,CoreML

      - name: Test
        run: swift test --skip-build

  test-linux:
    name: Swift ${{ matrix.swift }} on Linux
    runs-on: ubuntu-latest
    container: swift:${{ matrix.swift }}
    strategy:
      fail-fast: false
      matrix:
        swift:
          - "6.1.3"
          - "6.2.4"
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache Swift Package Manager dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/org.swift.swiftpm
            .build
          key: ${{ runner.os }}-swift-${{ matrix.swift }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-${{ matrix.swift }}-spm-

      - name: Lint
        run: swift format lint --strict --recursive .

      - name: Build
        run: swift build

      - name: Test
        run: swift test
